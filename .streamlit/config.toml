## Creating the `data/` folder

For the Excel files you can't type-and-create because you're uploading, not creating. Here's the trick:

**Step 1** — Click **"Add file"** → **"Upload files"**

**Step 2** — You'll see a path bar near the top that shows your repo name. Click on it and type `data/` — like this:
```
cashify-dashboard / data /
                    ↑ type this
```

> If that doesn't work in your browser, use this alternative method below ↓

**Alternative — Create a placeholder file first:**
1. Click **"Add file"** → **"Create new file"**
2. Type in the filename box: `data/placeholder.txt`
3. Type anything in the editor: `data folder`
4. Click **"Commit changes"**
5. Now go into the `data/` folder that appeared
6. Click **"Add file"** → **"Upload files"**
7. Upload both Excel files here
8. After uploading, you can delete `placeholder.txt` by clicking it → the trash icon

